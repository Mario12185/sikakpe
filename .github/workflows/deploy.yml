name: 🇹🇬 Déploiement SikaKpɛ

on:
  workflow_dispatch: # Lancement manuel depuis GitHub
  push:
    branches: [ main ] # Déclenchement automatique à chaque push sur main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Installation des dépendances
        run: npm ci --prefer-offline

      - name: 🌐 Export Web Expo (PWA)
        run: npx expo export --platform web
        # 💡 Expo SDK 50+ exporte par défaut dans le dossier 'dist/'

      - name: 🔍 Vérification du build
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ Échec: dist/index.html introuvable. Vérifiez les logs d'export Expo."
            exit 1
          fi
          echo "✅ Build réussi: dist/index.html trouvé"

      - name: 🔥 Déploiement Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: sikakpe-togo